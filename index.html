<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Langsir Ketapang v4</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:   #002244;
            --panel:     #0a1628;
            --border:    #1e3a5f;
            --secondary: #f5a623;
            --danger:    #d0021b;
            --success:   #27ae60;
            --loco:      #1a6fa8;
            --loco-hi:   #4da3d4;
            --selected:  #e07b10;
            --text:      #dce8f5;
            --sans:      'Roboto Condensed', Arial Narrow, Arial, sans-serif;
            --mono:      'Roboto Mono', 'Courier New', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: #111820;
            color: var(--text);
            padding: 8px;
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        .header {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            background: var(--primary);
            border-bottom: 3px solid var(--secondary);
            padding: 7px 12px;
            border-radius: 4px 4px 0 0;
        }
        .header-title {
            font-size: 15px; font-weight: 700; letter-spacing: 1.5px; color: #fff;
            flex: 1;
        }
        .header-title span { color: var(--secondary); }
        .hdr-stat {
            display: flex; flex-direction: column; align-items: center;
            min-width: 48px;
        }
        .hdr-stat-val { font-size: 20px; font-weight: 700; line-height: 1; color: var(--secondary); font-family: var(--mono); }
        .hdr-stat-lbl { font-size: 9px; color: #7a9cc0; letter-spacing: 1px; text-transform: uppercase; }

        .hdr-divider { width: 1px; height: 36px; background: var(--border); margin: 0 4px; }

        .hdr-btn {
            font-family: var(--sans); font-size: 12px; font-weight: 700;
            border: none; padding: 5px 12px; cursor: pointer; border-radius: 3px;
            transition: opacity .15s, background .15s;
            white-space: nowrap;
        }
        .hdr-btn:hover { opacity: .85; }
        .btn-save    { background: var(--success); color: #fff; }
        .btn-load    { background: #17568a; color: #fff; }
        .btn-export  { background: #444; color: #fff; }
        .btn-reset   { background: var(--danger); color: #fff; }

        /* ─── INFO BAR ─── */
        .info-bar {
            background: #07101c;
            border: 1px solid var(--border); border-top: none;
            padding: 4px 12px;
            font-family: var(--mono); font-size: 10px; color: #5a8ab0;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 5px;
        }
        .info-bar .hint { color: var(--secondary); font-weight: 700; }

        /* ─── MAP ─── */
        .map-wrapper {
            border: 1px solid var(--border);
            border-radius: 0 0 3px 3px;
            overflow-x: auto;
            background: #0d1a10;
        }
        .emplasemen-container {
            position: relative;
            width: 1440px; height: 640px;
            background-color: #0d1a10;
            user-select: none;
        }
        #svgDenah {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* ─── TRACK SLOT ─── */
        .track-slot {
            position: absolute;
            background: rgba(5, 15, 35, 0.88);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 3px 4px;
            z-index: 10;
        }
        .slot-header {
            display: flex; align-items: center; gap: 3px; margin-bottom: 2px;
        }
        .slot-name {
            font-family: var(--sans); font-size: 9px; font-weight: 700;
            color: #6aace8; flex: 1; white-space: nowrap; letter-spacing: .3px;
        }
        .slot-cap { font-family: var(--mono); font-size: 8px; color: #3a6080; }

        .btn-add-unit {
            font-size: 13px; font-weight: 700; line-height: 1;
            background: #0a3d1f; color: #2ecc71;
            border: 1px solid #1a7040; border-radius: 2px;
            width: 16px; height: 16px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: background .1s;
        }
        .btn-add-unit:hover { background: #1a6035; }

        /* ─── UNIT ROW ─── */
        .unit-row {
            display: flex; flex-direction: row; gap: 2px;
            min-height: 20px; flex-wrap: nowrap;
        }

        /* ─── UNIT CHIP ─── */
        .unit {
            font-family: var(--mono);
            background: #dde8f0; color: #0d1a2a;
            padding: 2px 5px; font-size: 10px; font-weight: 700;
            cursor: pointer; border-radius: 2px;
            border: 1px solid #88a8c8;
            white-space: nowrap; flex-shrink: 0;
            position: relative;
            transition: box-shadow .08s;
            display: flex; align-items: center; gap: 2px;
        }
        .unit:hover { box-shadow: 0 1px 4px rgba(0,0,0,.5); }

        .unit.loco {
            background: var(--loco); color: #fff;
            border-color: #0f4a7a; font-size: 10px;
        }
        .unit.loco .loco-arrow { font-size: 9px; }
        .unit.facing-east .loco-arrow::before { content: '▶'; }
        .unit.facing-west .loco-arrow::before { content: '◀'; }

        .unit.selected {
            background: var(--selected) !important;
            color: #fff !important;
            border-color: #a05000 !important;
            box-shadow: 0 0 6px rgba(224,123,16,.7);
        }

        /* Tidak ada del-btn — hapus pakai klik kanan */

        /* ─── MOVE BUTTONS ─── */
        .move-btns { display: flex; gap: 2px; flex-wrap: wrap; margin-top: 2px; }
        .btn-move {
            font-family: var(--sans); font-size: 9px; font-weight: 700;
            background: #0a3320; color: #2ecc71;
            border: 1px solid #1a5c35; padding: 1px 6px;
            border-radius: 2px; cursor: pointer; transition: background .1s;
            white-space: nowrap;
        }
        .btn-move:hover { background: #175030; }

        /* ─── DIRECTION HINT ─── */
        .dir-hint {
            font-family: var(--mono); font-size: 8px;
            color: #2a7abf; text-align: center; margin-top: 1px; opacity: .75;
        }

        /* ─── ADD UNIT POPUP ─── */
        .add-popup {
            position: absolute; z-index: 100;
            background: #0d1e35; border: 1px solid var(--secondary);
            border-radius: 4px; padding: 8px; width: 220px;
            box-shadow: 0 4px 20px rgba(0,0,0,.7);
        }
        .add-popup h4 {
            font-size: 11px; font-weight: 700; color: var(--secondary);
            margin-bottom: 6px; letter-spacing: .5px;
        }
        .add-popup label { font-size: 10px; color: #aac0d8; display: block; margin-bottom: 2px; }
        .add-popup select, .add-popup input {
            font-family: var(--mono); font-size: 11px;
            background: #07101c; color: var(--text);
            border: 1px solid var(--border); border-radius: 2px;
            padding: 3px 6px; width: 100%; margin-bottom: 5px;
        }
        .add-popup .preview {
            font-family: var(--mono); font-size: 12px; font-weight: 700;
            background: #1a3050; color: #fff; text-align: center;
            padding: 3px; border-radius: 2px; margin-bottom: 6px;
            letter-spacing: .5px;
        }
        .popup-btns { display: flex; gap: 5px; }
        .popup-btns button {
            flex: 1; font-family: var(--sans); font-size: 11px; font-weight: 700;
            border: none; padding: 4px; border-radius: 2px; cursor: pointer;
        }
        .btn-popup-ok  { background: var(--success); color: #fff; }
        .btn-popup-ok:hover  { background: #1e9050; }
        .btn-popup-cancel { background: #333; color: #ccc; }
        .btn-popup-cancel:hover { background: #444; }

        /* ─── LOG ─── */
        .log-wrap {
            margin-top: 6px;
            background: #04080f;
            border: 1px solid var(--border); border-left: 3px solid var(--secondary);
            border-radius: 2px; padding: 5px 10px;
            height: 120px; overflow-y: auto;
            font-family: var(--mono); font-size: 10px;
        }
        .log-entry { padding: 1px 0; border-bottom: 1px solid rgba(30,58,95,.25); }
        .log-ok   { color: #2ecc71; }
        .log-err  { color: #e74c3c; }
        .log-info { color: #5dade2; }
        .log-edit { color: #f5a623; }

        /* ─── CONTEXT MENU ─── */
        .ctx-menu {
            position: fixed; z-index: 200;
            background: #0d1e35; border: 1px solid var(--secondary);
            border-radius: 3px; padding: 4px 0;
            box-shadow: 0 4px 16px rgba(0,0,0,.7);
            min-width: 140px;
        }
        .ctx-item {
            padding: 5px 14px; font-size: 11px; cursor: pointer; color: var(--text);
            font-family: var(--sans); font-weight: 700;
        }
        .ctx-item:hover { background: #1a3050; color: #fff; }
        .ctx-item.danger { color: var(--danger); }
        .ctx-item.danger:hover { background: #3a0010; }

        /* ─── IMPORT FILE ─── */
        #importFile { display: none; }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-title">SIMULATOR LANGSIR <span>KETAPANG</span> <small style="color:#5dade2;font-size:10px;font-weight:400"> v4</small></div>

    <div class="hdr-stat">
        <div class="hdr-stat-val" id="moveCount">0</div>
        <div class="hdr-stat-lbl">GERAKAN</div>
    </div>
    <div class="hdr-stat">
        <div class="hdr-stat-val" id="selCount">0</div>
        <div class="hdr-stat-lbl">DIPILIH</div>
    </div>

    <div class="hdr-divider"></div>

    <button class="hdr-btn btn-save"   onclick="saveTemplate()">💾 SIMPAN</button>
    <button class="hdr-btn btn-load"   onclick="loadTemplate()">📂 MUAT</button>
    <button class="hdr-btn btn-export" onclick="exportJSON()">⬇ EXPORT</button>
    <button class="hdr-btn btn-export" onclick="document.getElementById('importFile').click()">⬆ IMPORT</button>
    <button class="hdr-btn btn-reset"  onclick="confirmReset()">↺ RESET</button>
    <input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
</div>

<div class="info-bar">
    <span id="statusBar">Drag unit untuk memilih rangkaian &nbsp;|&nbsp; <span class="hint">SHIFT+KLIK</span> extend seleksi &nbsp;|&nbsp; <span class="hint">KLIK KANAN</span> untuk hapus/tambah sarana &nbsp;|&nbsp; <span class="hint">+</span> di jalur untuk tambah sarana baru</span>
</div>

<!-- MAP -->
<div class="map-wrapper">
  <div class="emplasemen-container" id="map">

    <!-- ═══════════════════════════════════════════════════
         SVG DENAH SKEMATIK EMPLASEMEN KETAPANG
         Berdasarkan denah resmi KAI KM.18+484
         Koordinat dalam px (canvas 1440×640)

         ZONA:
         ┌─ BARAT (kiri) ──────────────────── TIMUR (kanan) ─┐
         │  Dipo KRT 1,2 + Cuci 1,2 (y≈60–200)              │
         │  Jalur Putar 29B/29C (y≈500–600)                  │
         │  Jalur Utama I–VI (y≈230–560) miring ke timur     │
         │  S.18 garis vertikal tengah (x≈620)               │
         │  Jalur Bongkar (antara I–II sisi timur)           │
         │  8E AGO + keluar ke Jember (x≈1200–1440)          │
         └────────────────────────────────────────────────────┘
    ════════════════════════════════════════════════════════ -->
    <svg id="svgDenah" viewBox="0 0 1440 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Gaya dasar rel -->
        <style>
          .rel       { stroke:#3a7a3a; stroke-width:2; fill:none; stroke-linecap:round; }
          .rel-main  { stroke:#4aaa4a; stroke-width:2.5; }
          .rel-dipo  { stroke:#2a6a5a; stroke-width:1.8; }
          .rel-ago   { stroke:#5aba5a; stroke-width:2.5; }
          .rel-dim   { stroke:#2a5a2a; stroke-width:1.5; stroke-dasharray:4,3; }
          .wesel-dot { fill:#f5a623; }
          .lbl       { font-family:'Roboto Condensed',Arial,sans-serif; font-size:10px; fill:#7ac87a; font-weight:700; }
          .lbl-sm    { font-family:'Roboto Condensed',Arial,sans-serif; font-size:9px;  fill:#5a9a5a; }
          .lbl-wesel { font-family:'Roboto Mono','Courier New',monospace; font-size:8px; fill:#f5a623; }
          .lbl-title { font-family:'Roboto Condensed',Arial,sans-serif; font-size:11px; fill:#aadaaa; font-weight:700; letter-spacing:0.5px; }
          .s18-line  { stroke:#f5a623; stroke-width:1; stroke-dasharray:6,4; opacity:0.6; }
          .s18-lbl   { font-family:'Roboto Mono',monospace; font-size:9px; fill:#f5a623; opacity:0.8; }
          .area-box  { fill:rgba(20,50,20,0.3); stroke:#2a5a2a; stroke-width:1; rx:3; }
        </style>
      </defs>

      <!-- ══════════════════════════════════════════════
           AREA DIPO (kiri atas)
      ══════════════════════════════════════════════ -->

      <!-- Dipo Kereta 1 — horizontal dari x=30 ke x=290, y=52 -->
      <line class="rel rel-dipo" x1="30"  y1="52"  x2="290" y2="52"/>
      <!-- Dipo Kereta 2 — y=90 -->
      <line class="rel rel-dipo" x1="30"  y1="90"  x2="290" y2="90"/>
      <!-- Cuci 1 — y=128 -->
      <line class="rel rel-dipo" x1="30"  y1="128" x2="290" y2="128"/>
      <!-- Cuci 2 — y=166 -->
      <line class="rel rel-dipo" x1="30"  y1="166" x2="290" y2="166"/>

      <!-- Buffer stop kiri dipo -->
      <line class="rel rel-dipo" x1="30" y1="46"  x2="30" y2="58"/>
      <line class="rel rel-dipo" x1="30" y1="84"  x2="30" y2="96"/>
      <line class="rel rel-dipo" x1="30" y1="122" x2="30" y2="134"/>
      <line class="rel rel-dipo" x1="30" y1="160" x2="30" y2="172"/>

      <!-- Label jalur dipo -->
      <text class="lbl-title" x="36" y="48">JALUR DIPO KERETA 1</text>
      <text class="lbl-title" x="36" y="86">JALUR DIPO KERETA 2</text>
      <text class="lbl-title" x="36" y="124">JALUR CUCI 1</text>
      <text class="lbl-title" x="36" y="162">JALUR CUCI 2</text>

      <!-- Dipo Loko 1 — dari wesel 30A ke kanan, y=108 -->
      <line class="rel rel-dipo" x1="370" y1="108" x2="600" y2="108"/>
      <line class="rel rel-dipo" x1="370" y1="136" x2="600" y2="136"/>
      <text class="lbl-title"   x="400"  y="104">JALUR DIPO LOKO 1</text>
      <text class="lbl-title"   x="400"  y="132">JALUR DIPO LOKO 2</text>
      <!-- Buffer stop kanan dipo loko -->
      <line class="rel rel-dipo" x1="600" y1="102" x2="600" y2="114"/>
      <line class="rel rel-dipo" x1="600" y1="130" x2="600" y2="142"/>

      <!-- ══════════════════════════════════════════════
           WESEL AREA BARAT-DIPO  (kiri, x≈290–380)
      ══════════════════════════════════════════════ -->

      <!-- Wesel 28A: Dipo KRT 1 & 2 bergabung ke jalur dipo tengah → y≈52/90 join ke y=71 -->
      <line class="rel rel-dipo" x1="290" y1="52"  x2="330" y2="71"/>
      <line class="rel rel-dipo" x1="290" y1="90"  x2="330" y2="71"/>
      <circle class="wesel-dot" cx="290" cy="52"  r="3.5"/>
      <circle class="wesel-dot" cx="290" cy="90"  r="3.5"/>
      <text class="lbl-wesel" x="292" y="67">28A</text>

      <!-- Wesel 11B: Cuci 1 & 2 bergabung, y≈128/166 join ke y=147 -->
      <line class="rel rel-dipo" x1="290" y1="128" x2="330" y2="147"/>
      <line class="rel rel-dipo" x1="290" y1="166" x2="330" y2="147"/>
      <circle class="wesel-dot" cx="290" cy="128" r="3.5"/>
      <circle class="wesel-dot" cx="290" cy="166" r="3.5"/>
      <text class="lbl-wesel" x="292" y="155">11B</text>

      <!-- Wesel 11A: dipo KRT (y=71) + cuci (y=147) join ke y=109 -->
      <line class="rel rel-dipo" x1="330" y1="71"  x2="360" y2="109"/>
      <line class="rel rel-dipo" x1="330" y1="147" x2="360" y2="109"/>
      <circle class="wesel-dot" cx="330" cy="71"  r="3.5"/>
      <circle class="wesel-dot" cx="330" cy="147" r="3.5"/>
      <text class="lbl-wesel" x="338" y="107">11A</text>

      <!-- Wesel 30A: dari y=109 ke Dipo Loko 1 (y=108) dan 30B ke Dipo Loko 2 (y=136) -->
      <line class="rel rel-dipo" x1="360" y1="109" x2="370" y2="108"/>
      <line class="rel rel-dipo" x1="360" y1="109" x2="370" y2="136"/>
      <circle class="wesel-dot" cx="360" cy="109" r="3.5"/>
      <text class="lbl-wesel" x="338" y="122">30A</text>
      <text class="lbl-wesel" x="356" y="132">30B</text>

      <!-- ══════════════════════════════════════════════
           WESEL 12 — join dipo ke jalur utama (x≈430, y≈109 ke y=230)
      ══════════════════════════════════════════════ -->
      <!-- Dari dipo loko (x=370,y=108-136) menyambung ke jalur I area tengah via wesel 12 -->
      <line class="rel rel-dipo" x1="370" y1="122" x2="430" y2="122"/>
      <line class="rel rel-dipo" x1="430" y1="122" x2="470" y2="200"/>
      <circle class="wesel-dot" cx="430" cy="122" r="3.5"/>
      <text class="lbl-wesel"   x="432" y="118">12</text>

      <!-- Wesel 10 — di jalur I sebelah kiri S.18 -->
      <circle class="wesel-dot" cx="490" cy="216" r="3.5"/>
      <text class="lbl-wesel"   x="492" y="213">10</text>

      <!-- Wesel 9 -->
      <circle class="wesel-dot" cx="530" cy="222" r="3.5"/>
      <text class="lbl-wesel"   x="533" y="219">9</text>

      <!-- ══════════════════════════════════════════════
           JALUR UTAMA I–VI  (body jalur horizontal + miring ke timur)
           Ujung barat miring konvergen, tengah–timur miring
           Referensi S.18 x=620
      ══════════════════════════════════════════════ -->

      <!-- Jalur I: y=240 barat → y=238 timur (hampir lurus) -->
      <line class="rel rel-main" x1="470" y1="218" x2="1160" y2="232"/>
      <!-- Jalur II: y=278 barat → y=278 timur -->
      <line class="rel rel-main" x1="450" y1="268" x2="1160" y2="268"/>
      <!-- Jalur III: miring turun ke timur -->
      <line class="rel rel-main" x1="400" y1="318" x2="1100" y2="300"/>
      <!-- Jalur IV -->
      <line class="rel rel-main" x1="340" y1="368" x2="1060" y2="336"/>
      <!-- Jalur V -->
      <line class="rel rel-main" x1="300" y1="418" x2="1020" y2="372"/>
      <!-- Jalur VI -->
      <line class="rel rel-main" x1="270" y1="468" x2="980"  y2="406"/>

      <!-- Label jalur utama di tengah -->
      <text class="lbl" x="640" y="228">I</text>
      <text class="lbl" x="640" y="265">II</text>
      <text class="lbl" x="640" y="298">III</text>
      <text class="lbl" x="640" y="334">IV</text>
      <text class="lbl" x="640" y="370">V</text>
      <text class="lbl" x="640" y="405">VI</text>

      <!-- ══════════════════════════════════════════════
           WESEL SISI BARAT JALUR UTAMA  (x≈300–530)
      ══════════════════════════════════════════════ -->

      <!-- Wesel 7: jalur I & II bergabung (y=218/268) ke luncur 2 -->
      <circle class="wesel-dot" cx="468" cy="268" r="3.5"/>
      <text class="lbl-wesel"   x="472" y="265">7</text>

      <!-- Wesel 8: jalur luncur 2 berpisah -->
      <circle class="wesel-dot" cx="420" cy="270" r="3.5"/>
      <text class="lbl-wesel"   x="424" y="267">8</text>

      <!-- Wesel 14: jalur luncur 2 ke arah barat laut -->
      <circle class="wesel-dot" cx="380" cy="270" r="3.5"/>
      <text class="lbl-wesel"   x="384" y="267">14</text>

      <!-- Jalur Luncur 2 — berbelok ke kiri atas -->
      <path class="rel rel-dim" d="M380,270 Q300,260 230,250 L100,248"/>
      <text class="lbl-sm" x="110" y="244">JALUR LUNCUR 2</text>
      <!-- Buffer stop -->
      <line class="rel rel-dipo" x1="100" y1="243" x2="100" y2="253"/>

      <!-- Wesel 11 -->
      <circle class="wesel-dot" cx="400" cy="318" r="3.5"/>
      <text class="lbl-wesel"   x="404" y="315">11</text>

      <!-- Wesel 13 -->
      <circle class="wesel-dot" cx="360" cy="360" r="3.5"/>
      <text class="lbl-wesel"   x="364" y="357">13</text>

      <!-- Wesel 15 -->
      <circle class="wesel-dot" cx="340" cy="380" r="3.5"/>
      <text class="lbl-wesel"   x="344" y="377">15</text>

      <!-- Jalur Luncur 4 — berbelok ke kiri -->
      <path class="rel rel-dim" d="M340,380 Q270,375 210,370 L100,368"/>
      <text class="lbl-sm" x="110" y="364">JALUR LUNCUR 4</text>
      <line class="rel rel-dipo" x1="100" y1="363" x2="100" y2="373"/>

      <!-- Wesel 16, 17, 18 — jalur putar (bawah kiri) -->
      <circle class="wesel-dot" cx="290" cy="440" r="3.5"/>
      <text class="lbl-wesel"   x="294" y="437">16</text>
      <circle class="wesel-dot" cx="250" cy="480" r="3.5"/>
      <text class="lbl-wesel"   x="254" y="477">17</text>
      <circle class="wesel-dot" cx="200" cy="520" r="3.5"/>
      <text class="lbl-wesel"   x="204" y="517">18</text>

const SWITCH_DATA = {

    "DIPO KRT 1-I":"28A,11A,12,10,9","DIPO KRT 2-I":"28A,11A,12,10,9",
    "CUCI 1-I":"11B,11A,12,10,9","CUCI 2-I":"11B,11A,12,10,9","JALUR LUNCUR 2-I":"14,10,9",
    "DIPO KRT 1-II":"28A,11A,12,10,9,7","DIPO KRT 2-II":"28A,11A,12,10,9,7",
    "CUCI 1-II":"11B,11A,12,10,9,7","CUCI 2-II":"11B,11A,12,10,9,7",
    "JALUR LUNCUR 2-II":"14,8,7","JALUR LUNCUR 4-II":"15,13,11,8,7",
    "JALUR LUNCUR 4-III":"15,13,11","JALUR LUNCUR 4-IV":"15,13",
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let trackConfigs = deepClone(DEFAULT_TRACKS);
let selectedUnits = [];
let fromTrack = null;
let moveCount = 0;
// editMode dihapus — tambah/hapus sarana via klik kanan & tombol + langsung

// context menu state
let ctxTrack  = null;
let ctxUnitIdx = null;

// drag-select state
let dragState = null;
let dragCurrentIdx = -1;

// add-popup state
let popupTrack = null;

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function getRelativeDir(from, to) {
    const fc = (trackConfigs[from].westX + trackConfigs[from].eastX) / 2;
    const tc = (trackConfigs[to].westX   + trackConfigs[to].eastX)   / 2;
    return fc < tc ? 'from-west' : 'from-east';
}
function isConnected(a, b) {
    return (CONNECTIONS[a] || []).includes(b) || (CONNECTIONS[b] || []).includes(a);
}
function getSwitch(from, to) {
    return SWITCH_DATA[`${from}-${to}`] || SWITCH_DATA[`${to}-${from}`] || 'Jalur Utama';
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render() {
    const map = document.getElementById('map');
    // Pertahankan SVG, hapus hanya track-slot lama
    Array.from(map.querySelectorAll('.track-slot')).forEach(el => el.remove());

    for (const [name, data] of Object.entries(trackConfigs)) {
        const slot = document.createElement('div');
        slot.className = 'track-slot';
        slot.style.cssText = `left:${data.x}px;top:${data.y}px;width:${data.w}px`;
        slot.dataset.track = name;

        // Header row
        const hdr = document.createElement('div');
        hdr.className = 'slot-header';

        const nameEl = document.createElement('span');
        nameEl.className = 'slot-name';
        nameEl.innerText = name;

        const capEl = document.createElement('span');
        capEl.className = 'slot-cap';
        capEl.innerText = `${data.units.length}/${data.cap}`;

        const addBtn = document.createElement('button');
        addBtn.className = 'btn-add-unit';
        addBtn.innerText = '+';
        addBtn.title = 'Tambah sarana';
        addBtn.onclick = (e) => { e.stopPropagation(); openAddPopup(name, addBtn); };

        hdr.appendChild(nameEl);
        hdr.appendChild(capEl);
        hdr.appendChild(addBtn);
        slot.appendChild(hdr);

        // Unit row
        const row = document.createElement('div');
        row.className = 'unit-row';

        data.units.forEach((u, i) => {
            const chip = document.createElement('div');
            const isLoco = u.toUpperCase().includes('LOK');
            const isSel  = (fromTrack === name && selectedUnits.includes(u));

            let cls = 'unit';
            if (isLoco) {
                cls += ' loco';
                cls += (i === 0) ? ' facing-east' : ' facing-west';
            }
            if (isSel) cls += ' selected';
            chip.className = cls;
            chip.dataset.track = name;
            chip.dataset.idx   = i;

            // Arrow for loco
            if (isLoco) {
                const arrow = document.createElement('span');
                arrow.className = 'loco-arrow';
                chip.appendChild(arrow);
            }

            const label = document.createElement('span');
            label.innerText = u;
            chip.appendChild(label);

            // Delete button (klik kanan — tidak perlu tombol × di chip)
            // Lihat: chip.addEventListener('contextmenu', ...)

            // Drag-select events (hanya saat bukan edit mode)
            chip.addEventListener('mousedown', onUnitMouseDown);
            chip.addEventListener('mouseenter', onUnitMouseEnter);

            // Klik kanan → context menu
            chip.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showCtxMenu(e.clientX, e.clientY, name, i);
            });

            row.appendChild(chip);
        });
        slot.appendChild(row);

        // MOVE buttons (hanya saat ada seleksi)
        if (selectedUnits.length > 0 && fromTrack && fromTrack !== name && isConnected(fromTrack, name)) {
            const btnBar = document.createElement('div');
            btnBar.className = 'move-btns';
            const btn = document.createElement('button');
            btn.className = 'btn-move';
            btn.innerText = `→ ${name}`;
            btn.onclick = () => move(name);
            btnBar.appendChild(btn);
            slot.appendChild(btnBar);
        }

        // Direction hint
        const locoIdx = data.units.findIndex(u => u.toUpperCase().includes('LOK'));
        if (locoIdx >= 0) {
            const hint = document.createElement('div');
            hint.className = 'dir-hint';
            hint.innerText = locoIdx === 0 ? 'W▶LOK···' : '···LOK◀E';
            slot.appendChild(hint);
        }

        map.appendChild(slot);
    }

    document.getElementById('moveCount').innerText = moveCount;
    document.getElementById('selCount').innerText  = selectedUnits.length;

    const sb = document.getElementById('statusBar');
    if (fromTrack && selectedUnits.length > 0) {
        sb.innerText = `Seleksi: ${selectedUnits.length} unit dari [${fromTrack}] — klik tombol → jalur tujuan`;
    } else {
        sb.innerText = 'Drag unit untuk memilih rangkaian | SHIFT+KLIK extend seleksi | KLIK KANAN sarana untuk hapus/opsi lain | + untuk tambah';
    }
}

// ══════════════════════════════════════════
//  DRAG SELECT
// ══════════════════════════════════════════
function onUnitMouseDown(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    const track = e.currentTarget.dataset.track;
    const idx   = parseInt(e.currentTarget.dataset.idx);

    if (e.shiftKey && fromTrack === track) {
        const units = trackConfigs[track].units;
        const idxs  = selectedUnits.map(u => units.indexOf(u)).filter(i => i >= 0);
        if (idxs.length > 0) {
            const minI = Math.min(...idxs, idx);
            const maxI = Math.max(...idxs, idx);
            selectedUnits = units.slice(minI, maxI + 1);
            render(); return;
        }
    }

    dragState = { track, startIdx: idx };
    dragCurrentIdx = idx;
    fromTrack = track;
    selectedUnits = [trackConfigs[track].units[idx]];
    render();
}

function onUnitMouseEnter(e) {
    if (!dragState) return;
    const track = e.currentTarget.dataset.track;
    if (track !== dragState.track) return;
    const idx = parseInt(e.currentTarget.dataset.idx);
    if (idx === dragCurrentIdx) return;
    dragCurrentIdx = idx;
    const units = trackConfigs[track].units;
    const minI  = Math.min(dragState.startIdx, idx);
    const maxI  = Math.max(dragState.startIdx, idx);
    selectedUnits = units.slice(minI, maxI + 1);
    render();
}

document.addEventListener('mouseup', () => { dragState = null; dragCurrentIdx = -1; });

// Klik di luar unit → deselect
document.getElementById('map') && document.addEventListener('mousedown', (e) => {
    if (!e.target.closest('.unit') && !e.target.closest('.btn-move') && !e.target.closest('.add-popup') && !e.target.closest('.ctx-menu')) {
        if (selectedUnits.length > 0) { selectedUnits = []; fromTrack = null; render(); }
    }
});

// ══════════════════════════════════════════
//  MOVE
// ══════════════════════════════════════════
function move(target) {
    if (!selectedUnits.length || !fromTrack || target === fromTrack) return;

    const hasLoco = selectedUnits.some(u => u.toUpperCase().includes('LOK'));
    if (!hasLoco) { addLog('GAGAL: Tidak ada Lokomotif dalam seleksi!', 'err'); return; }
    if (!isConnected(fromTrack, target)) { addLog(`GAGAL: [${fromTrack}] & [${target}] tidak terhubung!`, 'err'); return; }

    const dst = trackConfigs[target].units;
    if (dst.length + selectedUnits.length > trackConfigs[target].cap) {
        addLog(`GAGAL: [${target}] penuh! (${dst.length}/${trackConfigs[target].cap})`, 'err'); return;
    }

    const src = trackConfigs[fromTrack].units;
    const dir = getRelativeDir(fromTrack, target);

    // Hapus dari sumber
    const removeIdxs = selectedUnits.map(u => src.indexOf(u)).sort((a,b)=>b-a);
    removeIdxs.forEach(i => { if (i>=0) src.splice(i,1); });

    const locoSelIdx = selectedUnits.findIndex(u => u.toUpperCase().includes('LOK'));
    const locoLeads  = (dir==='from-west' && locoSelIdx === selectedUnits.length-1) ||
                       (dir==='from-east' && locoSelIdx === 0);
    const mode = locoLeads ? 'MENARIK' : 'MENDORONG';

    if (dir === 'from-west') {
        dst.unshift(...selectedUnits);
    } else {
        dst.push(...selectedUnits);
    }

    const sw = getSwitch(fromTrack, target);
    moveCount++;
    addLog(`GRK ${moveCount}: [${mode}] ${selectedUnits.length} unit  ${fromTrack} → ${target}  | Wesel: ${sw}`, 'ok');

    selectedUnits = []; fromTrack = null;
    autoSave();
    render();
}

// ══════════════════════════════════════════
//  DELETE UNIT
// ══════════════════════════════════════════
function deleteUnit(track, idx) {
    const unit = trackConfigs[track].units[idx];
    trackConfigs[track].units.splice(idx, 1);
    addLog(`HAPUS: [${unit}] dari jalur ${track}`, 'edit');
    autoSave();
    render();
}

// ══════════════════════════════════════════
//  CONTEXT MENU
// ══════════════════════════════════════════
function showCtxMenu(x, y, track, unitIdx) {
    ctxTrack   = track;
    ctxUnitIdx = unitIdx;
    const menu = document.getElementById('ctxMenu');
    menu.style.display = 'block';
    menu.style.left = x + 'px';
    menu.style.top  = y + 'px';
}
function hideCtxMenu() { document.getElementById('ctxMenu').style.display = 'none'; }
function ctxAddUnit()    { hideCtxMenu(); openAddPopup(ctxTrack, null); }
function ctxDeleteUnit() { hideCtxMenu(); if (ctxUnitIdx !== null) deleteUnit(ctxTrack, ctxUnitIdx); }
function ctxClearTrack() {
    hideCtxMenu();
    if (!ctxTrack) return;
    if (confirm(`Kosongkan semua sarana di jalur [${ctxTrack}]?`)) {
        trackConfigs[ctxTrack].units = [];
        addLog(`KOSONGKAN: Jalur ${ctxTrack}`, 'edit');
        autoSave(); render();
    }
}
document.addEventListener('click', hideCtxMenu);

// ══════════════════════════════════════════
//  ADD POPUP
// ══════════════════════════════════════════
function openAddPopup(track, anchorEl) {
    popupTrack = track;
    const overlay = document.getElementById('addPopupOverlay');
    overlay.style.display = 'block';

    // Build popup
    const popup = document.createElement('div');
    popup.className = 'add-popup';
    popup.id = 'addPopup';
    popup.onclick = e => e.stopPropagation();

    // Position
    if (anchorEl) {
        const rect = anchorEl.getBoundingClientRect();
        popup.style.position = 'fixed';
        popup.style.left = rect.left + 'px';
        popup.style.top  = (rect.bottom + 4) + 'px';
    } else {
        popup.style.position = 'fixed';
        popup.style.left = '50%';
        popup.style.top  = '40%';
        popup.style.transform = 'translate(-50%,-50%)';
    }

    popup.innerHTML = `
        <h4>➕ TAMBAH SARANA — ${track}</h4>
        <label>Tipe Sarana</label>
        <select id="popTipe" onchange="updatePreview()">
            ${SARANA_TYPES.map(t => `<option value="${t.code}" data-prefix="${t.prefix}">${t.label}</option>`).join('')}
        </select>
        <label>Nomor / Nama</label>
        <input type="text" id="popNomor" placeholder="cth: 08123 atau CC206 01" oninput="updatePreview()" />
        <label>Posisi di jalur</label>
        <select id="popPos">
            <option value="west">Ujung BARAT (kiri)</option>
            <option value="east">Ujung TIMUR (kanan)</option>
        </select>
        <div class="preview" id="popPreview">—</div>
        <div class="popup-btns">
            <button class="btn-popup-ok"     onclick="confirmAddUnit()">✓ Tambah</button>
            <button class="btn-popup-cancel" onclick="closePopup()">✕ Batal</button>
        </div>
    `;

    overlay.appendChild(popup);
    updatePreview();
    document.getElementById('popNomor').focus();
}

function updatePreview() {
    const sel = document.getElementById('popTipe');
    if (!sel) return;
    const opt    = sel.options[sel.selectedIndex];
    const prefix = opt.dataset.prefix;
    const nomor  = (document.getElementById('popNomor').value || '').trim();
    const code   = sel.value;
    let preview;
    if (code === 'CUSTOM') {
        preview = nomor || '—';
    } else {
        preview = prefix + (nomor || '?????');
    }
    document.getElementById('popPreview').innerText = preview;
}

function confirmAddUnit() {
    const sel    = document.getElementById('popTipe');
    const opt    = sel.options[sel.selectedIndex];
    const prefix = opt.dataset.prefix;
    const nomor  = document.getElementById('popNomor').value.trim();
    const pos    = document.getElementById('popPos').value;
    const code   = sel.value;

    let name;
    if (code === 'CUSTOM') {
        name = nomor;
    } else {
        name = prefix + (nomor || '?????');
    }

    if (!name) { alert('Nama sarana tidak boleh kosong!'); return; }

    const track = trackConfigs[popupTrack];
    if (track.units.length >= track.cap) {
        alert(`Jalur [${popupTrack}] sudah penuh (${track.cap} unit)!`); return;
    }

    if (pos === 'west') {
        track.units.unshift(name);
    } else {
        track.units.push(name);
    }

    addLog(`TAMBAH: [${name}] ke jalur ${popupTrack} sisi ${pos === 'west' ? 'BARAT' : 'TIMUR'}`, 'edit');
    closePopup();
    autoSave();
    render();
}

function closePopup(e) {
    if (e && e.target !== document.getElementById('addPopupOverlay')) return;
    const overlay = document.getElementById('addPopupOverlay');
    overlay.style.display = 'none';
    const existing = document.getElementById('addPopup');
    if (existing) existing.remove();
    popupTrack = null;
}

// ══════════════════════════════════════════
//  SAVE / LOAD / EXPORT / IMPORT
// ══════════════════════════════════════════
const STORAGE_KEY = 'langsir_ketapang_v4';

function getSnapshot() {
    const snap = {};
    for (const [k, v] of Object.entries(trackConfigs)) {
        snap[k] = { units: [...v.units] };
    }
    return { tracks: snap, moveCount, savedAt: new Date().toISOString() };
}

function applySnapshot(snap) {
    for (const [k, v] of Object.entries(snap.tracks)) {
        if (trackConfigs[k]) trackConfigs[k].units = [...(v.units || [])];
    }
    moveCount = snap.moveCount || 0;
}

function autoSave() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(getSnapshot())); } catch(_) {}
}

function saveTemplate() {
    autoSave();
    addLog('💾 Template disimpan ke browser (LocalStorage)', 'info');
    // Animasi tombol
    const btn = document.querySelector('.btn-save');
    btn.innerText = '✅ TERSIMPAN';
    setTimeout(() => { btn.innerText = '💾 SIMPAN'; }, 1500);
}

function loadTemplate() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { addLog('Tidak ada template tersimpan di browser ini.', 'err'); return; }
    try {
        const snap = JSON.parse(raw);
        applySnapshot(snap);
        selectedUnits = []; fromTrack = null;
        addLog(`📂 Template dimuat (disimpan: ${new Date(snap.savedAt).toLocaleString('id-ID')})`, 'info');
        render();
    } catch(e) { addLog('Gagal memuat template: data rusak.', 'err'); }
}

function exportJSON() {
    const snap = getSnapshot();
    const blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `langsir_ketapang_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    addLog('⬇ Template diekspor sebagai file JSON', 'info');
}

function importJSON(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const snap = JSON.parse(ev.target.result);
            applySnapshot(snap);
            selectedUnits = []; fromTrack = null;
            addLog(`⬆ Template diimpor dari file: ${file.name}`, 'info');
            render();
        } catch(_) { addLog('Gagal impor: file tidak valid.', 'err'); }
    };
    reader.readAsText(file);
    e.target.value = '';
}

function confirmReset() {
    if (!confirm('Reset simulator ke kondisi awal? Seluruh posisi sarana akan dikembalikan.')) return;
    trackConfigs  = deepClone(DEFAULT_TRACKS);
    selectedUnits = []; fromTrack = null; moveCount = 0;
    addLog('↺ Reset ke kondisi awal.', 'info');
    autoSave();
    render();
}

// ══════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════
function addLog(msg, type='info') {
    const log  = document.getElementById('log');
    const el   = document.createElement('div');
    el.className = `log-entry log-${type}`;
    const now  = new Date();
    const ts   = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    el.innerText = `[${ts}] ${msg}`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
// Coba load auto-save
(function init() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
        try {
            const snap = JSON.parse(raw);
            applySnapshot(snap);
            addLog(`📂 Auto-load template terakhir (${new Date(snap.savedAt).toLocaleString('id-ID')})`, 'info');
        } catch(_) {}
    }
    addLog('Simulator Langsir Ketapang v4 — Denah SVG aktif. Klik kanan sarana untuk hapus, tombol + untuk tambah.', 'info');
    render();

    // Deselect jika klik di peta tapi bukan unit
    document.getElementById('map').addEventListener('mousedown', (e) => {
        if (!e.target.closest('.unit') && !e.target.closest('.btn-move') && !e.target.closest('.btn-add-unit')) {
            if (selectedUnits.length > 0) { selectedUnits = []; fromTrack = null; render(); }
        }
    });
})();
</script>
