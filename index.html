<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator Langsir Realistic - Stasiun Ketapang</title>
    <style>
        :root { --primary: #002d5e; --secondary: #f39c12; --danger: #e74c3c; --success: #27ae60; --track-bg: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #dfe6e9; margin: 0; padding: 10px; }
        
        .main-container { max-width: 1400px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        
        /* Layout Grid */
        .emplasemen-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr; /* Sisi Kiri (Dipo/Cuci) & Sisi Kanan (Utama) */
            gap: 20px;
            margin-top: 20px;
        }

        .section-title { 
            background: var(--primary); color: white; padding: 5px 15px; 
            font-size: 14px; border-radius: 4px; margin-bottom: 10px; text-align: center;
        }

        /* Styling Jalur */
        .track-row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
        .track-label { width: 100px; font-size: 12px; font-weight: bold; color: #2d3436; }
        .track-lane { 
            flex-grow: 1; display: flex; gap: 4px; background: var(--track-bg); 
            padding: 6px; border-radius: 4px; min-height: 40px; align-items: center;
            border-bottom: 2px solid #95a5a6; overflow-x: auto;
        }

        /* Gerbong */
        .unit { 
            background: #ecf0f1; color: #2c3e50; padding: 5px 10px; border-radius: 2px;
            font-size: 11px; font-weight: bold; cursor: pointer; white-space: nowrap;
            border: 1px solid #bdc3c7; box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        .unit.selected { background: var(--secondary); color: white; border-color: #d35400; }

        /* Controls & Logs */
        .stats-bar { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 10px 20px; border-radius: 5px; margin-bottom: 15px; }
        .btn-move { padding: 5px 10px; background: var(--success); color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 10px; }
        #simLog { background: #000; color: #00ff00; padding: 10px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 5px; margin-top: 15px; }
        
        .header-title { text-align: center; color: var(--primary); margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-title">
        <h2 style="margin:0">SIMULATOR REALISTIC - STASIUN KETAPANG</h2>
        <small>Mode: Emplasemen Layout | PPKA Monitoring System</small>
    </div>

    <div class="stats-bar">
        <div>TOTAL GERAKAN: <span id="moveCount" style="font-size: 20px; color: var(--secondary);">0</span></div>
        <div id="statusInfo">Pilih unit di ujung jalur...</div>
        <button onclick="location.reload()" style="background:var(--danger); border:none; color:white; padding:5px 10px; border-radius:3px; cursor:pointer;">Reset</button>
    </div>

    <div class="emplasemen-grid">
        <div class="side-area">
            <div class="section-title">AREA PERAWATAN (DIPO & CUCI)</div>
            <div id="tracks-dipo"></div>
            
            <div style="margin-top:20px" class="section-title">AREA PENYIMPANAN</div>
            <div id="tracks-storage"></div>
        </div>

        <div class="main-area">
            <div class="section-title">JALUR UTAMA (SPOOR I - VI)</div>
            <div id="tracks-main"></div>
            
            <div style="margin-top:20px" class="section-title">WESEL / LEHER LANGSIR</div>
            <div id="tracks-leher"></div>
        </div>
    </div>

    <div id="simLog">>>> Sistem Siap. Menunggu instruksi...</div>
</div>

<script>
    // Data Emplasemen Realistic
    const dataJalur = {
        // Area Utama
        "SP I": { cap: 14, area: "main", units: [] },
        "SP II": { cap: 15, area: "main", units: [] },
        "SP III": { cap: 16, area: "main", units: [] },
        "SP IV": { cap: 15, area: "main", units: [] },
        "SP V": { cap: 15, area: "main", units: [] },
        "SP VI": { cap: 17, area: "main", units: ["M1 09401", "4 M1", "2 K3NG", "P 06802", "2 K1", "4 KRT"] },
        
        // Area Perawatan (Atas)
        "DIPO LOKO 1": { cap: 5, area: "dipo", units: [] },
        "DIPO LOKO 2": { cap: 5, area: "dipo", units: [] },
        "DIPO KRT 1": { cap: 5, area: "dipo", units: ["B 06604", "K3PP 06558", "K3PP 06529", "K3NG 01421", "K3 09304"] },
        "DIPO KRT 2": { cap: 7, area: "dipo", units: ["K3PP 06548", "K1SS 01837", "MP3 01403", "K1 00229", "P 06409", "K1SS 01866", "K1 08618"] },
        "CUCI 1": { cap: 11, area: "dipo", units: [] },
        "CUCI 2": { cap: 11, area: "dipo", units: [] },

        // Area Penolong/Wesel
        "LEHER WESEL": { cap: 20, area: "leher", units: [] },
        "SPOOR BADUG": { cap: 5, area: "storage", units: [] }
    };

    let selectedUnit = null;
    let fromTrack = null;
    let moveCount = 0;

    function render() {
        // Reset container
        document.getElementById('tracks-main').innerHTML = '';
        document.getElementById('tracks-dipo').innerHTML = '';
        document.getElementById('tracks-leher').innerHTML = '';
        document.getElementById('tracks-storage').innerHTML = '';

        for (const [name, data] of Object.entries(dataJalur)) {
            const row = document.createElement('div');
            row.className = 'track-row';
            
            let unitsHtml = data.units.map((u, i) => {
                const isSelectable = (i === data.units.length - 1);
                const isSelected = (selectedUnit === u && fromTrack === name && isSelectable);
                return `<div class="unit ${isSelected ? 'selected' : ''}" onclick="selectUnit('${name}', ${i})">${u}</div>`;
            }).join('');

            row.innerHTML = `
                <div class="track-label">${name}</div>
                <div class="track-lane">${unitsHtml}</div>
                <button class="btn-move" onclick="moveTo('${name}')">MASUK</button>
            `;

            // Masukkan ke area yang sesuai
            document.getElementById(`tracks-${data.area}`).appendChild(row);
        }
        document.getElementById('moveCount').innerText = moveCount;
    }

    function selectUnit(track, idx) {
        if (idx !== dataJalur[track].units.length - 1) {
            addLog("INFO: Hanya unit terluar yang bisa ditarik ke wesel.");
            return;
        }
        selectedUnit = dataJalur[track].units[idx];
        fromTrack = track;
        document.getElementById('statusInfo').innerText = `Membawa: ${selectedUnit}`;
        render();
    }

    function moveTo(target) {
        if (!selectedUnit || target === fromTrack) return;
        if (dataJalur[target].units.length >= dataJalur[target].cap) {
            addLog(`ALARM: Jalur ${target} Penuh!`, "danger");
            return;
        }

        dataJalur[fromTrack].units.pop();
        dataJalur[target].units.push(selectedUnit);
        moveCount++;
        addLog(`GERAKAN ${moveCount}: ${selectedUnit} -> ${target}`);
        
        selectedUnit = null;
        fromTrack = null;
        document.getElementById('statusInfo').innerText = "Siap...";
        render();
    }

    function addLog(msg, type="") {
        const log = document.getElementById('simLog');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    render();
</script>
</body>
</html>
